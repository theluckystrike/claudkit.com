<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudKit — Claude API Playground | Build & Test Requests</title>
  <meta name="description" content="Interactive Claude API playground. Build requests visually, get code in curl/Python/JS, and test with your own API key. Free, no sign-up.">
  <meta property="og:title" content="ClaudKit — Claude API Playground">
  <meta property="og:description" content="Build and test Claude API requests visually. Get code in curl, Python, and JavaScript.">
  <meta property="og:url" content="https://claudkit.com/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://claudkit.com/">
  <link rel="stylesheet" href="assets/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "ClaudKit API Playground",
    "url": "https://claudkit.com",
    "description": "Interactive API request builder for Claude with syntax-highlighted code output in curl, Python, and JavaScript.",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
</head>
<body>
  <nav>
    <a href="/" class="brand">ClaudKit</a>
    <ul class="nav-links">
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/about.html">About</a></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>Claude API Playground</h1>
    <p>Build requests visually. Get code in curl, Python, and JavaScript.</p>
  </section>

  <div class="playground">
    <!-- Left Panel: Request Builder -->
    <div class="panel">
      <h2>Request Builder</h2>

      <div class="preset-row">
        <label>Preset:</label>
        <select id="preset-select" class="btn"></select>
      </div>

      <div class="form-group">
        <label>Model</label>
        <select id="model-select"></select>
      </div>

      <div class="form-group">
        <label>System Prompt</label>
        <textarea id="system-prompt" rows="3" placeholder="You are a helpful assistant..."></textarea>
      </div>

      <div class="form-group">
        <label>User Message</label>
        <textarea id="user-message" rows="4" placeholder="Enter your message..."></textarea>
      </div>

      <div class="form-group">
        <label>Temperature</label>
        <div class="slider-row">
          <input type="range" id="temp-slider" min="0" max="1" step="0.1" value="0.3">
          <span class="slider-value" id="temp-value">0.3</span>
        </div>
      </div>

      <div class="form-group">
        <label>Max Tokens</label>
        <input type="text" id="max-tokens" value="1024" placeholder="1024">
      </div>
    </div>

    <!-- Right Panel: Code Output -->
    <div class="panel">
      <h2>Generated Code</h2>

      <div class="tab-bar">
        <button class="tab active" data-tab="curl">curl</button>
        <button class="tab" data-tab="python">Python</button>
        <button class="tab" data-tab="javascript">JavaScript</button>
      </div>

      <div class="code-block-wrapper">
        <div class="code-block" id="code-display"></div>
        <button class="btn btn-sm copy-btn" id="copy-code-btn">Copy</button>
      </div>

      <!-- Try It Section -->
      <div class="try-section">
        <h3>Try with your API key</h3>
        <div class="form-group">
          <input type="password" id="api-key" placeholder="sk-ant-api03-...">
        </div>
        <button class="btn btn-accent" id="send-btn">Send Request</button>
        <div class="status-msg" id="status-msg"></div>
        <div class="response-area" id="response-area"></div>
      </div>
    </div>
  </div>

  <footer>
    Built by <a href="https://zovo.one">zovo.one</a> &middot; More tools: <a href="https://claudhq.com">ClaudHQ</a>, <a href="https://claudflow.com">ClaudFlow</a>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
